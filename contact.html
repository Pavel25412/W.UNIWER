<!DOCTYPE html>
<html lang="ru">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WU - Контакты</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<header>
  <a href="index.html">
    <img src="logo.png" alt="WU Logo" class="logo-img">
  </a>
  <nav>
    <a href="index.html">Главная</a>
    <a href="services.html">Услуги</a>
    <a href="contact.html" class="active">Контакты</a>
  </nav>
</header>

<main class="page-container">
  <div class="page-title">
    <h1>Свяжитесь с нами</h1>
    <div class="line"></div>
  </div>

  <div class="contact-wrapper">
    <div class="contact-info">
      <h3>Наши контакты</h3>
      <p>Мы всегда рады ответить на ваши вопросы. Напишите нам, и мы подберем удобное время для консультации.</p>
      <br>
      <p><strong>Email:</strong> contact@wu-poland.com</p>
      <p><strong>Телефон:</strong> +48 123 456 789</p>
      <p><strong>Адрес:</strong> Варшава, Польша (офис онлайн)</p>
    </div>

    <div class="contact-form">
      <form action="https://script.google.com/macros/s/AKfycbxOGt5ADtnmbVXPkNcu6a0KY72D1boTbwKTdKDS58yhZwqSeyPY3M8rgEaAkFKcUd7W/exec" method="POST">

        <div class="form-group">
          <label>Ваше имя</label>
          <input type="text" name="name" placeholder="Иван Иванов" required>
        </div>

        <div class="form-group">
          <label>Email для связи</label>
          <input type="email" name="email" placeholder="example@mail.com" required>
        </div>

        <div class="form-group">
          <label>Сообщение</label>
          <textarea name="message" rows="5" placeholder="Я хочу поступить..." required></textarea>
        </div>

        <button type="submit" class="btn" style="width: 100%;">Отправить в таблицу</button>
      </form>
    </div>
  </div>
</main>

<footer>
  <p>&copy; 2023 WU Admission. Все права защищены.</p>
</footer>

</body>
</html>
