<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>W.UNIWER - Создание пароля</title>
    <style>
        /* Импортируем шрифт, похожий на твой */
        @import url('https://fonts.googleapis.com/css2?family=Montserrat:wght@500;700;900&display=swap');

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: #f4f5f7;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
        }

        .card {
            background: white;
            padding: 50px 40px;
            border-radius: 30px; /* Сильное скругление как на скрине */
            box-shadow: 0 15px 35px rgba(0,0,0,0.03);
            width: 100%;
            max-width: 400px;
            text-align: center;
        }

        .logo-badge {
            background: #111;
            color: white;
            display: inline-block;
            padding: 8px 14px;
            font-weight: 900;
            margin-bottom: 25px;
            font-size: 18px;
            letter-spacing: 1px;
        }

        h2 {
            margin: 0 0 12px 0;
            font-size: 28px;
            text-transform: uppercase;
            font-weight: 900;
            color: #1a1a1a;
            letter-spacing: -0.5px;
        }

        p {
            color: #777;
            font-size: 14px;
            margin-bottom: 35px;
            font-weight: 500;
            line-height: 1.4;
            font-family: 'Inter', sans-serif;
        }

        .input-group {
            text-align: left;
            margin-bottom: 25px;
        }

        .input-label {
            font-size: 13px;
            font-weight: 700;
            margin-bottom: 8px;
            display: block;
            color: #333;
            font-family: 'Inter', sans-serif;
        }

        input {
            width: 100%;
            box-sizing: border-box;
            padding: 16px;
            border: 1px solid #eee;
            border-radius: 12px;
            font-size: 15px;
            background-color: #fafafa;
            outline: none;
            font-family: inherit;
            transition: all 0.2s;
        }

        input:focus {
            border-color: #d34545;
            background-color: #fff;
            box-shadow: 0 0 0 4px rgba(211, 69, 69, 0.1);
        }

        button {
            background-color: #d34545; /* Твой фирменный красный */
            color: white;
            border: none;
            padding: 18px;
            width: 100%;
            border-radius: 12px;
            cursor: pointer;
            font-size: 14px;
            font-weight: 900;
            text-transform: uppercase;
            letter-spacing: 1px;
            transition: background 0.3s, transform 0.1s;
        }

        button:hover {
            background-color: #b83b3b;
        }

        button:active {
            transform: scale(0.98);
        }

        #message { margin-top: 20px; font-size: 14px; font-weight: bold; min-height: 20px; }
        .error { color: #d34545; }
        .success { color: #28a745; }
    </style>
</head>
<body>

<div class="card">
    <div class="logo-badge">WU</div>
    <h2>СОЗДАНИЕ ПАРОЛЯ</h2>
    <p>Придумайте данные для доступа в кабинет абитуриента</p>

    <div class="input-group">
        <label class="input-label">Новый пароль</label>
        <input type="password" id="passwordInput" placeholder="••••••••" required>
    </div>

    <button onclick="submitPassword()">Сохранить пароль</button>

    <div id="message"></div>
</div>

<script>
    async function submitPassword() {
        const password = document.getElementById('passwordInput').value;
        const messageDiv = document.getElementById('message');
        const urlParams = new URLSearchParams(window.location.search);
        const token = urlParams.get('token');

        if (!token) {
            messageDiv.innerHTML = "<span class='error'>Token missing!</span>";
            return;
        }
        if (password.length < 6) {
            messageDiv.innerHTML = "<span class='error'>Пароль должен быть не менее 6 символов.</span>";
            return;
        }

        messageDiv.innerHTML = "Синхронизация...";

        try {
            // Обрати внимание: порт 7070, как мы настроили в Java
            const response = await fetch('http://localhost:7070/api/set-password', {
                method: 'POST',
                headers: { 'Content-Type': 'application/json' },
                body: JSON.stringify({ token, password })
            });

            const text = await response.text();

            if (response.ok) {
                messageDiv.innerHTML = "<span class='success'>" + text + "</span>";
                // Через 2 секунды перекидываем на логин
                setTimeout(() => window.location.href = 'login.html', 2000);
            } else {
                messageDiv.innerHTML = "<span class='error'>" + text + "</span>";
            }
        } catch (e) {
            messageDiv.innerHTML = "<span class='error'>Сервер не отвечает (порт 7070).</span>";
        }
    }
</script>

</body>
</html>
